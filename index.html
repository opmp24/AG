<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="Gastop - Gestión y control de gastos del hogar con privacidad total y almacenamiento local seguro" />
  <meta name="theme-color" content="#4ade80" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gastop" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap"
    rel="stylesheet" />
  <title>Gastop - Finanzas Inteligentes</title>
</head>

<body>
  <div id="root"></div>

  <!-- Diagnóstico de Emergencia si la App falla al cargar -->
  <div id="error-screen" style="display:none; position:fixed; inset:0; background:#0f0f23; color:#fff; padding:2rem; font-family:sans-serif; text-align:center; z-index:9999;">
    <h1 style="color:#ef4444; font-size:1.5rem;">🚨 Error de Carga de Aplicación</h1>
    <p style="opacity:0.8; font-size:0.9rem; margin-bottom:2rem;">Parece que los archivos no se están sirviendo correctamente (MIME Type o 404).</p>
    <div style="background:rgba(255,255,255,0.05); padding:1rem; border-radius:12px; margin-bottom:2rem; text-align:left; font-family:monospace; font-size:0.8rem;">
      <p id="error-details">Detectando problema...</p>
    </div>
    <button onclick="location.reload()" style="background:#4ade80; color:#000; border:none; padding:0.8rem 1.5rem; border-radius:8px; font-weight:900; cursor:pointer;">REINTENTAR CARGA</button>
  </div>

  <script>
    // Script de rescate: si el script principal no carga en 5 segundos, muestra error
    window.addEventListener('error', function(e) {
      if (e.target.tagName === 'SCRIPT' || e.message.includes('MIME')) {
        document.getElementById('error-screen').style.display = 'block';
        document.getElementById('error-details').innerText = 'ERROR: No se pueden cargar los módulos (Posible origen en src/ en lugar de dist/). Asegúrate de que el despliegue sea la carpeta DIST.';
      }
    }, true);
  </script>

  <script type="module" src="./src/main.tsx"></script>
</body>

</html>
